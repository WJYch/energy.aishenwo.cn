<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政策数据库 — 电小团 Little Electric Cloud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ===== Theme Variables ===== */
        :root {
            --bg: #000;
            --text: #fff;
            --text-secondary: rgba(255,255,255,0.55);
            --text-tertiary: rgba(255,255,255,0.35);
            --text-muted: rgba(255,255,255,0.2);
            --text-strong: rgba(255,255,255,0.4);
            --card-bg: rgba(255,255,255,0.03);
            --card-border: rgba(255,255,255,0.06);
            --card-hover-bg: rgba(255,255,255,0.05);
            --card-hover-border: rgba(255,255,255,0.12);
            --chip-bg: rgba(255,255,255,0.04);
            --chip-border: rgba(255,255,255,0.06);
            --chip-text: rgba(255,255,255,0.6);
            --nav-bg: rgba(0,0,0,0.85);
            --nav-border: rgba(255,255,255,0.06);
            --nav-link: rgba(255,255,255,0.6);
            --nav-link-hover: #fff;
            --nav-link-hover-bg: rgba(255,255,255,0.06);
            --nav-toggle-color: #fff;
            --footer-border: rgba(255,255,255,0.04);
            --iframe-border: rgba(255,255,255,0.06);
            --iframe-bg: rgba(255,255,255,0.02);
            --icon-bg: rgba(255,255,255,0.05);
            --logo-filter: brightness(1.2);
            --card-title: #fff;
            --card-text: rgba(255,255,255,0.45);
            --chip-dot-1: #5E8B7E;
            --chip-dot-2: #7C9FBA;
            --chip-dot-3: #A78BCC;
            --chip-dot-4: #E8A87C;
            --chip-dot-5: #5E8B7E;
            --chip-dot-6: #7C9FBA;
            --stat-color: #5E8B7E;
            --highlight-color: #5E8B7E;
            --icon-1-bg: rgba(94,139,126,0.15);
            --icon-2-bg: rgba(124,159,186,0.15);
            --icon-3-bg: rgba(167,139,204,0.15);
            --icon-4-bg: rgba(232,168,124,0.15);
            --icon-5-bg: rgba(94,139,126,0.15);
            --icon-6-bg: rgba(124,159,186,0.15);
            --gradient-text: linear-gradient(135deg, #5E8B7E 0%, #7C9FBA 40%, #A78BCC 70%, #E8A87C 100%);
            --iframe-label-color: rgba(255,255,255,0.45);
            --nav-mobile-bg: rgba(0,0,0,0.95);
            --dxt-btn-bg: rgba(255,255,255,0.08);
            --dxt-btn-shadow: rgba(0,0,0,0.5);
            --dxt-btn-border: rgba(255,255,255,0.15);
            --dxt-btn-hover-border: rgba(255,255,255,0.3);
        }

        [data-theme="light"] {
            --bg: #f5f5f0;
            --text: #1a1a1a;
            --text-secondary: rgba(0,0,0,0.55);
            --text-tertiary: rgba(0,0,0,0.35);
            --text-muted: rgba(0,0,0,0.2);
            --text-strong: rgba(0,0,0,0.5);
            --card-bg: rgba(255,255,255,0.7);
            --card-border: rgba(0,0,0,0.08);
            --card-hover-bg: rgba(255,255,255,0.9);
            --card-hover-border: rgba(0,0,0,0.15);
            --chip-bg: rgba(255,255,255,0.6);
            --chip-border: rgba(0,0,0,0.08);
            --chip-text: rgba(0,0,0,0.55);
            --nav-bg: rgba(255,255,255,0.85);
            --nav-border: rgba(0,0,0,0.06);
            --nav-link: rgba(0,0,0,0.5);
            --nav-link-hover: #000;
            --nav-link-hover-bg: rgba(0,0,0,0.05);
            --nav-toggle-color: #000;
            --footer-border: rgba(0,0,0,0.06);
            --iframe-border: rgba(0,0,0,0.08);
            --iframe-bg: rgba(255,255,255,0.5);
            --icon-bg: rgba(0,0,0,0.04);
            --logo-filter: brightness(0.9);
            --card-title: #000;
            --card-text: rgba(0,0,0,0.5);
            --chip-dot-1: #4a7a6a;
            --chip-dot-2: #5a7f9a;
            --chip-dot-3: #8a6aaa;
            --chip-dot-4: #c0805a;
            --chip-dot-5: #4a7a6a;
            --chip-dot-6: #5a7f9a;
            --stat-color: #4a7a6a;
            --highlight-color: #4a7a6a;
            --icon-1-bg: rgba(74,122,106,0.12);
            --icon-2-bg: rgba(90,127,154,0.12);
            --icon-3-bg: rgba(138,106,170,0.12);
            --icon-4-bg: rgba(192,128,90,0.12);
            --icon-5-bg: rgba(74,122,106,0.12);
            --icon-6-bg: rgba(90,127,154,0.12);
            --gradient-text: linear-gradient(135deg, #4a7a6a 0%, #5a7f9a 40%, #8a6aaa 70%, #c0805a 100%);
            --iframe-label-color: rgba(0,0,0,0.45);
            --nav-mobile-bg: rgba(255,255,255,0.95);
            --dxt-btn-bg: rgba(255,255,255,0.7);
            --dxt-btn-shadow: rgba(0,0,0,0.12);
            --dxt-btn-border: rgba(0,0,0,0.1);
            --dxt-btn-hover-border: rgba(0,0,0,0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* ===== Navigation ===== */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--nav-border);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .nav-logo img { height: 28px; width: auto; filter: var(--logo-filter); transition: filter 0.3s ease; }
        .nav-logo .logo-text {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.02em;
        }
        .nav-logo .logo-sub {
            font-size: 10px;
            font-weight: 400;
            color: var(--text-tertiary);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .nav-links {
            display: flex;
            gap: 2px;
            list-style: none;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--nav-link);
            font-size: 13px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 6px;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }
        .nav-links a:hover { color: var(--nav-link-hover); background: var(--nav-link-hover-bg); }
        .nav-links a.active { color: var(--nav-link-hover); }
        .nav-toggle { display: none; background: none; border: none; font-size: 20px; color: var(--nav-toggle-color); cursor: pointer; padding: 8px; }

        /* ===== Theme Toggle Button ===== */
        .theme-toggle {
            background: none; border: none; cursor: pointer; padding: 8px 10px;
            font-size: 16px; color: var(--nav-link); border-radius: 6px;
            transition: all 0.2s; display: flex; align-items: center; gap: 4px;
            margin-left: 4px;
        }
        .theme-toggle:hover { color: var(--nav-link-hover); background: var(--nav-link-hover-bg); }
        .theme-toggle .toggle-label {
            font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
        }
        @media (max-width: 900px) {
            .navbar { padding: 0 16px; }
            .nav-toggle { display: block; }
            .nav-links {
                display: none;
                position: absolute; top: 64px; left: 0; right: 0;
                background: var(--nav-mobile-bg);
                backdrop-filter: blur(20px);
                flex-direction: column;
                padding: 12px 16px;
                border-bottom: 1px solid var(--nav-border);
            }
            .nav-links.open { display: flex; }
            .nav-links a { padding: 12px 14px; width: 100%; }
            .theme-toggle { padding: 8px 6px; }
            .theme-toggle .toggle-label { display: none; }
        }

        /* ===== Page Header ===== */
        .page-header {
            padding: 120px 24px 40px;
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }
        .page-header .header-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
        }
        .page-header h1 {
            font-size: clamp(28px, 4.5vw, 38px);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 14px;
        }
        .page-header p {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 680px;
            margin: 0 auto 6px;
            line-height: 1.8;
        }
        .page-header .highlight {
            color: var(--highlight-color);
            font-weight: 600;
        }

        /* ===== Stats ===== */
        .stats-bar {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 24px 10px;
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
        }
        .stat-item .stat-num {
            font-size: 28px;
            font-weight: 800;
            color: var(--stat-color);
        }
        .stat-item .stat-label {
            font-size: 12px;
            color: var(--text-tertiary);
            font-weight: 500;
            margin-top: 2px;
        }

        /* ===== Feature Chips ===== */
        .features-row {
            max-width: 1000px;
            margin: 0 auto;
            padding: 10px 24px 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .feature-chip {
            background: var(--chip-bg);
            border: 1px solid var(--chip-border);
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 13px;
            color: var(--chip-text);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }
        .feature-chip .chip-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .feature-chip:nth-child(1) .chip-dot { background: var(--chip-dot-1); }
        .feature-chip:nth-child(2) .chip-dot { background: var(--chip-dot-2); }
        .feature-chip:nth-child(3) .chip-dot { background: var(--chip-dot-3); }
        .feature-chip:nth-child(4) .chip-dot { background: var(--chip-dot-4); }
        .feature-chip:nth-child(5) .chip-dot { background: var(--chip-dot-5); }
        .feature-chip:nth-child(6) .chip-dot { background: var(--chip-dot-6); }

        /* ===== Capabilities Section ===== */
        .capabilities {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 24px 40px;
        }
        .capabilities h2 {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .capabilities > .subtitle {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .cap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }
        .cap-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 28px 22px 22px;
            border: 1px solid var(--card-border);
            transition: all 0.25s, background 0.3s ease, border-color 0.3s ease;
            text-align: center;
        }
        .cap-card:hover { transform: translateY(-3px); background: var(--card-hover-bg); border-color: var(--card-hover-border); }
        .cap-card .cap-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            font-size: 28px;
            background: var(--icon-bg);
            border-radius: 12px;
            margin-bottom: 14px;
            transition: background 0.3s ease;
        }
        .cap-card:nth-child(1) .cap-icon { background: var(--icon-1-bg); }
        .cap-card:nth-child(2) .cap-icon { background: var(--icon-2-bg); }
        .cap-card:nth-child(3) .cap-icon { background: var(--icon-3-bg); }
        .cap-card:nth-child(4) .cap-icon { background: var(--icon-4-bg); }
        .cap-card:nth-child(5) .cap-icon { background: var(--icon-5-bg); }
        .cap-card:nth-child(6) .cap-icon { background: var(--icon-6-bg); }
        .cap-card h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--card-title);
        }
        .cap-card p {
            font-size: 13px;
            color: var(--card-text);
            line-height: 1.7;
        }

        /* ===== Iframe Section ===== */
        .iframe-section {
            max-width: 1100px;
            margin: 0 auto;
            padding: 10px 24px 60px;
        }
        .iframe-label {
            text-align: center;
            font-size: 14px;
            color: var(--iframe-label-color);
            margin-bottom: 16px;
            letter-spacing: 0.03em;
        }
        .iframe-label i {
            margin-right: 6px;
            color: var(--stat-color);
        }
        .iframe-wrapper {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--iframe-border);
            background: var(--iframe-bg);
            transition: border-color 0.3s ease, background 0.3s ease;
        }
        .iframe-wrapper iframe {
            width: 100%;
            height: 900px;
            border: none;
            display: block;
        }

        /* ===== Footer ===== */
        .footer {
            border-top: 1px solid var(--footer-border);
            padding: 32px 32px;
            text-align: center;
        }
        .footer p { font-size: 13px; color: var(--text-muted); letter-spacing: 0.03em; }
        .footer strong { color: var(--text-strong); font-weight: 500; }




        @media (max-width: 640px) {
            .page-header { padding-top: 90px; }
            .iframe-wrapper iframe { height: 600px; }
            .stats-bar { gap: 24px; }
        }
    </style>

<script>
(function() {
    const theme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    updateThemeUI(theme);
})();

function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeUI(next);
}

function updateThemeUI(theme) {
    const icon = document.getElementById('theme-icon');
    const label = document.getElementById('theme-label');
    if (!icon || !label) return;
    if (theme === 'dark') {
        icon.className = 'fa-solid fa-moon';
        label.textContent = '深色';
    } else {
        icon.className = 'fa-solid fa-sun';
        label.textContent = '浅色';
    }
}
</script>


<script>
const FAQ = {
  '做哪些业务': '电小团聚焦综合能源运营服务，核心业务包括：\n\n🔹 数据采集 — 基于HomeAssistant生态，15分钟级高频率数据采集\n🔹 数据分析 — 电价/负荷/政策多维数据库，AI交叉分析\n🔹 能源运营 — 售电优化、空调节能、需量管理、VPP虚拟电厂\n🔹 在线工具 — 电费分析、能源规划、能源诊断等\n\n你可以查看<a href="/pro/" style="color:var(--accent);font-weight:600">增值服务 →</a>了解更多。',
  '你好': '你好呀！欢迎来到电小团 👋\n我是你的综合能源运营助手。可以问我：\n\u2022 做哪些业务？\n\u2022 有哪些工具？\n\u2022 有哪些培训课程？\n\u2022 怎么联系合作？\n\n或者直接输入任何问题～',
  '默认': '感谢提问！建议先看看这些：\n\n👉 <a href="/training/" style="color:var(--accent);font-weight:600">免费培训 →</a>\n👉 <a href="/tools/" style="color:var(--accent);font-weight:600">在线工具 →</a>\n👉 <a href="/about/" style="color:var(--accent);font-weight:600">关于电小团 →</a>\n\n或者换个问题试试？'
};

function togglePetChat() {
  var overlay = document.getElementById('dxt-pet-overlay');
  overlay.classList.toggle('open');
  if (overlay.classList.contains('open')) {
    setTimeout(function(){ document.getElementById('dxt-user-input').focus(); }, 350);
  }
}
function closePetChat() {
  document.getElementById('dxt-pet-overlay').classList.remove('open');
}
function addMessage(text, role) {
  var area = document.getElementById('dxt-msg-area');
  var msg = document.createElement('div');
  msg.className = 'dxt-msg ' + role;
  msg.innerHTML = text.replace(/\n/g, '<br>');
  area.appendChild(msg);
  var now = new Date();
  var t = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var tm = document.createElement('div');
  tm.className = 'dxt-msg-time';
  tm.textContent = t;
  area.appendChild(tm);
  area.scrollTop = area.scrollHeight;
}
function showTyping() {
  var area = document.getElementById('dxt-msg-area');
  var el = document.createElement('div');
  el.className = 'dxt-typing';
  el.id = 'dxt-typing-indicator';
  el.innerHTML = '<span></span><span></span><span></span>';
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}
function hideTyping() {
  var el = document.getElementById('dxt-typing-indicator');
  if (el) el.remove();
}
function findAnswer(text) {
  var t = text.trim();
  for (var key in FAQ) {
    if (key === '\u9ed8\u8ba4') continue;
    if (t.indexOf(key) !== -1) return FAQ[key];
  }
  return FAQ['\u9ed8\u8ba4'];
}
function sendMessage() {
  var input = document.getElementById('dxt-user-input');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage(text, 'user');
  document.getElementById('dxt-send-btn').disabled = true;
  document.getElementById('dxt-quick-replies').style.display = 'none';
  showTyping();
  setTimeout(function(){
    hideTyping();
    addMessage(findAnswer(text), 'bot');
    document.getElementById('dxt-send-btn').disabled = false;
  }, 600 + Math.random() * 600);
}
function sendQuick(text) {
  document.getElementById('dxt-user-input').value = text;
  sendMessage();
}
// Click outside to close
document.addEventListener('click', function(e) {
  var overlay = document.getElementById('dxt-pet-overlay');
  var btn = document.getElementById('dxt-pet-btn');
  if (overlay && overlay.classList.contains('open') && !overlay.contains(e.target) && !btn.contains(e.target)) {
    closePetChat();
  }
});
</script></body>

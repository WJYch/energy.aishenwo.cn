<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>增值服务 — 电小团</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
:root { --transition: 0.3s; }
/* ===== Light Theme ===== */
.theme-light {
  --bg-body: #F8F9FC;
  --bg-nav: rgba(255,255,255,0.9);
  --border-nav: rgba(0,0,0,0.04);
  --text: #1F2937;
  --text-secondary: #6B7280;
  --text-muted: #9CA3AF;
  --bg-card: #FFFFFF;
  --border-card: rgba(0,0,0,0.04);
  --card-hover: rgba(94,139,126,0.06);
  --accent: #5E8B7E;
  --accent2: #7C9FBA;
  --accent3: #A78BCC;
  --accent4: #E8A87C;
  --feature-text: #4B5563;
  --shadow-sm: 0 2px 16px rgba(0,0,0,0.04);
  --shadow-hover: 0 12px 40px rgba(94,139,126,0.10);
}
/* ===== Dark Theme ===== */
.theme-dark {
  --bg-body: #000;
  --bg-nav: rgba(0,0,0,0.85);
  --border-nav: rgba(255,255,255,0.06);
  --text: #FFFFFF;
  --text-secondary: rgba(255,255,255,0.45);
  --text-muted: rgba(255,255,255,0.25);
  --bg-card: rgba(255,255,255,0.03);
  --border-card: rgba(255,255,255,0.06);
  --card-hover: rgba(255,255,255,0.06);
  --accent: #5E8B7E;
  --accent2: #7C9FBA;
  --accent3: #A78BCC;
  --accent4: #E8A87C;
  --feature-text: rgba(255,255,255,0.6);
  --shadow-sm: 0 2px 16px rgba(0,0,0,0.3);
  --shadow-hover: 0 12px 40px rgba(94,139,126,0.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-body);
  color: var(--text);
  line-height: 1.6;
  transition: background var(--transition), color var(--transition);
  -webkit-font-smoothing: antialiased;
}
/* ===== Navbar ===== */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg-nav);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-nav);
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background var(--transition), border var(--transition);
}
.nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.nav-logo img { height: 28px; width: auto; }
.theme-dark .nav-logo img { filter: brightness(1.2); }
.nav-logo .logo-text { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
.nav-logo .logo-sub { font-size: 10px; font-weight: 400; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; }
.nav-links { display: flex; gap: 2px; list-style: none; align-items: center; }
.nav-links a {
  text-decoration: none; color: var(--text-secondary);
  font-size: 13px; font-weight: 500; padding: 6px 14px;
  border-radius: 6px; transition: all 0.2s;
}
.nav-links a:hover { color: var(--text); background: var(--card-hover); }
.nav-links a.active { color: var(--accent); }
.theme-dark .nav-links a.active { color: #fff; }
.nav-toggle { display: none; background: none; border: none; font-size: 20px; color: var(--text); cursor: pointer; padding: 8px; }
.theme-toggle {
  background: none; border: 1px solid var(--border-card); border-radius: 20px;
  padding: 6px 14px; cursor: pointer; font-size: 14px; color: var(--text-secondary);
  display: flex; align-items: center; gap: 6px; transition: all 0.2s; margin-left: 8px;
}
.theme-toggle:hover { background: var(--card-hover); color: var(--text); }
@media (max-width: 900px) {
  .navbar { padding: 0 16px; }
  .nav-toggle { display: block; }
  .nav-links {
    display: none; position: absolute; top: 64px; left: 0; right: 0;
    background: var(--bg-nav); backdrop-filter: blur(20px);
    flex-direction: column; padding: 12px 16px;
    border-bottom: 1px solid var(--border-nav);
  }
  .nav-links.open { display: flex; }
  .nav-links a { padding: 12px 14px; width: 100%; }
}
/* ===== Page Header ===== */
.page-header {
  padding: 120px 24px 50px;
  text-align: center;
}
.page-header h1 {
  font-size: clamp(28px, 5vw, 40px);
  font-weight: 800;
  color: var(--text);
  margin-bottom: 8px;
}
.page-header h1 span {
  color: var(--accent);
}
.page-header p {
  color: var(--text-secondary);
  font-size: 16px;
  max-width: 520px;
  margin: 0 auto;
}
/* ===== Service Cards ===== */
.services {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px 70px;
  display: flex;
  flex-direction: column;
  gap: 40px;
}
.service-card {
  background: var(--bg-card);
  border-radius: 24px;
  padding: 40px 44px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-card);
  transition: all 0.3s;
  display: flex;
  gap: 40px;
  align-items: flex-start;
}
.service-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(94,139,126,0.15);
}
.service-card .card-icon {
  flex-shrink: 0;
  width: 72px;
  height: 72px;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  background: rgba(94,139,126,0.10);
  color: var(--accent);
}
.service-card .card-body {
  flex: 1;
  min-width: 0;
}
.service-card .card-body h2 {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.service-card .card-body .desc {
  font-size: 15px;
  color: var(--feature-text);
  line-height: 1.7;
  margin-bottom: 18px;
}
.service-card .feature-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 20px;
  margin-bottom: 22px;
}
.service-card .feature-list li {
  list-style: none;
  font-size: 14px;
  color: var(--feature-text);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
}
.service-card .feature-list li i {
  color: var(--accent);
  font-size: 14px;
  flex-shrink: 0;
}
.btn-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, #5E8B7E, #7C9FBA);
  color: #fff;
  border: none;
  padding: 12px 32px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.3s;
  box-shadow: 0 4px 16px rgba(94,139,126,0.25);
}
.btn-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(94,139,126,0.35);
}
@media (max-width: 820px) {
  .service-card {
    flex-direction: column;
    padding: 28px 24px;
    gap: 20px;
  }
  .service-card .card-icon {
    width: 56px;
    height: 56px;
    font-size: 26px;
  }
  .service-card .feature-list {
    grid-template-columns: 1fr;
  }
  .service-card .card-body h2 {
    font-size: 18px;
  }
}
/* ===== Footer ===== */
.footer {
  border-top: 1px solid var(--border-card);
  padding: 28px 24px;
  text-align: center;
}
.footer p { font-size: 14px; color: var(--text-muted); }
.footer strong { color: var(--accent); font-weight: 600; }
</style>

<body class="theme-dark">



<script>
// Theme toggle
function toggleTheme() {
  const body = document.body;
  const icon = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');
  if (body.classList.contains('theme-dark')) {
    body.classList.replace('theme-dark', 'theme-light');
    icon.textContent = '🌙';
    label.textContent = '深色';
    localStorage.setItem('dxt-theme', 'light');
  } else {
    body.classList.replace('theme-light', 'theme-dark');
    icon.textContent = '☀️';
    label.textContent = '浅色';
    localStorage.setItem('dxt-theme', 'dark');
  }
}
// Restore theme
(function() {
  const saved = localStorage.getItem('dxt-theme');
  if (saved === 'light') {
    document.body.classList.replace('theme-dark', 'theme-light');
    document.getElementById('theme-icon').textContent = '🌙';
    document.getElementById('theme-label').textContent = '深色';
  }
})();
</script>


<script>
const FAQ = {
  '做哪些业务': '电小团聚焦综合能源运营服务，核心业务包括：\n\n🔹 数据采集 — 基于HomeAssistant生态，15分钟级高频率数据采集\n🔹 数据分析 — 电价/负荷/政策多维数据库，AI交叉分析\n🔹 能源运营 — 售电优化、空调节能、需量管理、VPP虚拟电厂\n🔹 在线工具 — 电费分析、能源规划、能源诊断等\n\n你可以查看<a href="/pro/" style="color:var(--accent);font-weight:600">增值服务 →</a>了解更多。',
  '你好': '你好呀！欢迎来到电小团 👋\n我是你的综合能源运营助手。可以问我：\n\u2022 做哪些业务？\n\u2022 有哪些工具？\n\u2022 有哪些培训课程？\n\u2022 怎么联系合作？\n\n或者直接输入任何问题～',
  '默认': '感谢提问！建议先看看这些：\n\n👉 <a href="/training/" style="color:var(--accent);font-weight:600">免费培训 →</a>\n👉 <a href="/tools/" style="color:var(--accent);font-weight:600">在线工具 →</a>\n👉 <a href="/about/" style="color:var(--accent);font-weight:600">关于电小团 →</a>\n\n或者换个问题试试？'
};

function togglePetChat() {
  var overlay = document.getElementById('dxt-pet-overlay');
  overlay.classList.toggle('open');
  if (overlay.classList.contains('open')) {
    setTimeout(function(){ document.getElementById('dxt-user-input').focus(); }, 350);
  }
}
function closePetChat() {
  document.getElementById('dxt-pet-overlay').classList.remove('open');
}
function addMessage(text, role) {
  var area = document.getElementById('dxt-msg-area');
  var msg = document.createElement('div');
  msg.className = 'dxt-msg ' + role;
  msg.innerHTML = text.replace(/\n/g, '<br>');
  area.appendChild(msg);
  var now = new Date();
  var t = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var tm = document.createElement('div');
  tm.className = 'dxt-msg-time';
  tm.textContent = t;
  area.appendChild(tm);
  area.scrollTop = area.scrollHeight;
}
function showTyping() {
  var area = document.getElementById('dxt-msg-area');
  var el = document.createElement('div');
  el.className = 'dxt-typing';
  el.id = 'dxt-typing-indicator';
  el.innerHTML = '<span></span><span></span><span></span>';
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}
function hideTyping() {
  var el = document.getElementById('dxt-typing-indicator');
  if (el) el.remove();
}
function findAnswer(text) {
  var t = text.trim();
  for (var key in FAQ) {
    if (key === '\u9ed8\u8ba4') continue;
    if (t.indexOf(key) !== -1) return FAQ[key];
  }
  return FAQ['\u9ed8\u8ba4'];
}
function sendMessage() {
  var input = document.getElementById('dxt-user-input');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage(text, 'user');
  document.getElementById('dxt-send-btn').disabled = true;
  document.getElementById('dxt-quick-replies').style.display = 'none';
  showTyping();
  setTimeout(function(){
    hideTyping();
    addMessage(findAnswer(text), 'bot');
    document.getElementById('dxt-send-btn').disabled = false;
  }, 600 + Math.random() * 600);
}
function sendQuick(text) {
  document.getElementById('dxt-user-input').value = text;
  sendMessage();
}
// Click outside to close
document.addEventListener('click', function(e) {
  var overlay = document.getElementById('dxt-pet-overlay');
  var btn = document.getElementById('dxt-pet-btn');
  if (overlay && overlay.classList.contains('open') && !overlay.contains(e.target) && !btn.contains(e.target)) {
    closePetChat();
  }
});
</script></body>

<script>
const FAQ = {
  '做哪些业务': '电小团聚焦综合能源运营服务，核心业务包括：\n\n🔹 数据采集 — 基于HomeAssistant生态，15分钟级高频率数据采集\n🔹 数据分析 — 电价/负荷/政策多维数据库，AI交叉分析\n🔹 能源运营 — 售电优化、空调节能、需量管理、VPP虚拟电厂\n🔹 在线工具 — 储能测算、电费分析、电价监控等\n\n你可以查看<a href="/pro/" style="color:var(--teal);font-weight:600">增值服务 →</a>了解更多。',
  '储能': '电小团提供储能投资测算工具，支持：\n\n• 基于江苏行政分时电价的充放策略\n• 两充两放/一充一放模式对比\n• 投资回报周期、IRR测算\n• 项目参数灵活调整\n\n👉 <a href="/tools/" style="color:var(--teal);font-weight:600">免费试用 →</a>',
  '培训': '电小团提供9大主题培训课程：\n\n⚡ 电力市场 &nbsp;|&nbsp; 💰 电价数据\n🔋 储能 &nbsp;|&nbsp; 🌬️ 风电\n🏭 VPP虚拟电厂 &nbsp;|&nbsp; 🌱 零碳园区\n🤖 AI数字化 &nbsp;|&nbsp; 📊 行业报告\n📝 其他专题\n\n所有课程免费学习 👉 <a href="/training/" style="color:var(--teal);font-weight:600">进入培训 →</a>',
  '联系': '您可以通过以下方式联系电小团：\n\n📧 邮件：dianxiaotuan@aishenwo.cn\n💬 飞书：搜索"电小团"机器人\n🌐 官网：energy.aishenwo.cn\n\n也可直接留言，我们会在1个工作日内回复。',
  '虚拟电厂': '电小团在VPP领域提供：\n\n• 可调负荷聚合（空调/充电桩/储能）\n• 需求响应策略优化\n• 用能编排与削峰填谷\n• 多站室协同调度\n\n我们已在隆兴未来社、万豪源宿酒店等项目中实战验证。',
  '空调节能': '电小团空调节能方案：\n\n• 基于物理模型+AI的深度能效优化\n• 兼容既有设备\n• 15分钟级实时监控与自动寻优\n• 典型节能率10-25%',
  '电费': '电小团电费分析工具支持：\n\n• 单一制/两部制电价对比\n• 峰平谷时段用电结构分析\n• 需量管理建议\n• 分时电价策略优化',
  '价格': '电小团提供灵活的定价模式：\n\n🔹 免费层 — 培训课程、基础工具免费\n🔹 专业层 — 增值API服务，按调用量计费\n🔹 定制层 — 专属项目定制\n\n👉 <a href="/pro/" style="color:var(--teal);font-weight:600">查看价格 →</a>',
  '你好': '你好呀！欢迎来到电小团 👋\n我是你的综合能源运营助手。可以问我：\n• 做哪些业务？\n• 储能测算怎么用？\n• 有哪些培训课程？\n• 怎么联系合作？\n\n或者直接输入任何问题～',
  '默认': '感谢提问！建议先看看这些：\n\n👉 <a href="/training/" style="color:var(--teal);font-weight:600">免费培训 →</a>\n👉 <a href="/tools/" style="color:var(--teal);font-weight:600">在线工具 →</a>\n👉 <a href="/about/" style="color:var(--teal);font-weight:600">关于电小团 →</a>\n\n或者换个问题试试？'
};

function togglePetChat() {
  var overlay = document.getElementById('dxt-pet-overlay');
  overlay.classList.toggle('open');
  if (overlay.classList.contains('open')) {
    setTimeout(function(){ document.getElementById('dxt-user-input').focus(); }, 350);
  }
}
function closePetChat() {
  document.getElementById('dxt-pet-overlay').classList.remove('open');
}
function addMessage(text, role) {
  var area = document.getElementById('dxt-msg-area');
  var msg = document.createElement('div');
  msg.className = 'dxt-msg ' + role;
  msg.innerHTML = text.replace(/\n/g, '<br>');
  area.appendChild(msg);
  var now = new Date();
  var t = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var tm = document.createElement('div');
  tm.className = 'dxt-msg-time';
  tm.textContent = t;
  area.appendChild(tm);
  area.scrollTop = area.scrollHeight;
}
function showTyping() {
  var area = document.getElementById('dxt-msg-area');
  var el = document.createElement('div');
  el.className = 'dxt-typing';
  el.id = 'dxt-typing-indicator';
  el.innerHTML = '<span></span><span></span><span></span>';
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}
function hideTyping() {
  var el = document.getElementById('dxt-typing-indicator');
  if (el) el.remove();
}
function findAnswer(text) {
  var t = text.trim();
  for (var key in FAQ) {
    if (key === '默认') continue;
    if (t.indexOf(key) !== -1) return FAQ[key];
  }
  return FAQ['默认'];
}
function sendMessage() {
  var input = document.getElementById('dxt-user-input');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage(text, 'user');
  document.getElementById('dxt-send-btn').disabled = true;
  document.getElementById('dxt-quick-replies').style.display = 'none';
  showTyping();
  setTimeout(function(){
    hideTyping();
    addMessage(findAnswer(text), 'bot');
    document.getElementById('dxt-send-btn').disabled = false;
  }, 600 + Math.random() * 600);
}
function sendQuick(text) {
  document.getElementById('dxt-user-input').value = text;
  sendMessage();
}
document.addEventListener('click', function(e) {
  var overlay = document.getElementById('dxt-pet-overlay');
  var btn = document.getElementById('dxt-pet-btn');
  if (overlay.classList.contains('open') && !overlay.contains(e.target) && !btn.contains(e.target)) {
    closePetChat();
  }
});
</script>

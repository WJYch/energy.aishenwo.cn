function toggleA(el, idx){

function mdToHtml(text){
  var lines = text.split('\n'), html = '', inCode = false, codeLines = [];
  for(var i=0;i<lines.length;i++){
    var line = lines[i];
    if(line.trim().startsWith('```')){
      if(inCode){ html+='<pre><code>'+esc(codeLines.join('\n'))+'</code></pre>'; codeLines=[]; inCode=false; }
      else inCode=true;
      continue;
    }
    if(inCode){ codeLines.push(line); continue; }
    if(line.trim()===''){ continue; }
    if(line.trim()==='---'){ html+='<hr>'; continue; }
    if(line.startsWith('#### ')){ html+='<h4>'+inl(line.slice(5))+'</h4>'; continue; }
    if(line.startsWith('### ')){ html+='<h3>'+inl(line.slice(4))+'</h3>'; continue; }
    if(line.startsWith('## ')){ html+='<h2>'+inl(line.slice(3))+'</h2>'; continue; }
    if(line.startsWith('# ')){ continue; }
    if(line.trim().startsWith('- ')){ html+='<li>'+inl(line.trim().slice(2))+'</li>'; continue; }
    if(line.trim()) html+='<p>'+inl(line)+'</p>';
  }
  html = html.replace(/(<li>.*?<\/li>\s*)+/g, function(m){ return '<ul>'+m+'</ul>'; });
  return html;
}
function inl(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/\[\[(.+?)\]\]/g,'<code>[[$1]]</code>').replace(/\`(.+)\`/g,'<code>$1</code>'); }
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

> **主题A组：风电与新能源** | 来源：2025北京国际风能大会（CWP2025）培训文件 | 文件数：约60个
> 提炼日期：2026-06-28 | 提炼方法：四层次分析法

---

## 第一层次：行业全景与趋势判断

### 1.1 宏观政策驱动

- **"双碳"目标持续发力**：中国2030年碳达峰、2060年碳中和目标推动风电产业高速发展。《2030年前碳达峰行动方案》明确要求加快风电、光伏等可再生能源基地建设，坚持海陆统筹。
- **千乡万村驭风行动**：2024年3月三部门联合印发《关于组织开展"千乡万村驭风行动"的通知》，推动乡村分散式风电发展，每个行政村不超过20MW，年新增装机预计约20GW，带动投资约1000亿元。
- **136号文全面市场化**：发改价格〔2025〕833号文彻底打破固定电价模式，所有风电、光伏项目上网电量原则上全部进入电力市场，电价由市场交易形成。
- **习近平主席联合国承诺**：2035年风电与光伏装机总规模力争达到36亿千瓦，中国从"新能源大国"转向"新能源体系设计国家"。
- **国际对标**：英国发布《Clean Power 2030 Action Plan》，要求2030年海上风电从15GW增至43-50GW；丹麦通过气候法案，2030年减排70%；北海埃斯比约宣言目标为2030年海上风电65GW、2050年150GW。

### 1.2 产业趋势特征

| 趋势维度 | 关键特征 | 典型文件来源 |
|---------|---------|------------|
| **机组大型化** | 东方电气26MW原型机已下线；明阳20MW、西门子歌美飒21MW原型机；海上单机容量增速远超DNV预期（14-18MW→26MW仅用3年） | 304, 277 |
| **深远海发展** | 从中近海走向中远海；柔性直流/低频输电成主流；漂浮式、海上制氢制氨成新方向 | 277, 190 |
| **数字化/AI化** | 基于模型的设计（MBD）缩短研发周期5倍以上；AI智能体助推预测性运维；数字孪生加速研发 | 247, 235, 237 |
| **全生命周期管理** | 从设计→制造→运行→退役全链条碳足迹管理；LCA/EPD认证在国际市场日趋重要 | 256 |
| **乡村分散式爆发** | 政策红利释放，村企合作模式创新，节地型、低噪声、智能化技术成为刚需 | 305, 306, 307 |

### 1.3 核心挑战

- 大规模海上风电并网消纳：出力不确定性、远距离输电约束、系统调峰能力不足
- 机组大型化带来的安全裕度降低：设计轻量化导致制造敏感性急剧上升
- 电价市场化对投资收益的冲击：负电价常态化（2024年荷兰457小时负电价）
- 复杂环境适应性：高海拔、高湍流、沙戈荒、台风区等极端工况的技术突破

## 第二层次：关键技术路线与解决方案

### 2.1 大型风电与海上风电技术

#### 2.1.1 并网消纳与调控（文件190）

- **四大核心挑战**：出力时空不确定性、系统调节能力适配不足、远距离并网技术成本约束、多维度协同调控复杂性
- **集群汇集方式**：交流并联（辐射状/单边状/双边状/复合环）与直流汇集（并联型/串联型/矩阵型）
- **并网技术路线**：工频交流并网（技术成熟、成本低但传输距离受限）、高压直流并网（远距离大容量优势）、低频交流并网（降低损耗）
- **优化调度方法**：多风电场时空相关性建模、考虑不确定性的鲁棒优化调度

#### 2.1.2 超高海拔风电实践（文件246）

- **大唐八宿项目**：全球海拔最高风电场（5050米），5MW双馈机组
- **关键技术攻关**：高升力翼型+涡流发生器解决叶片失速；高效冷却系统+增容散热设计；智能控制策略+预防预警系统
- **管理创新**：六方联动"日调度、周计划、月总结"机制，最终实现安全、环保、质量"三个零"
- **成果**：创造全球海拔最高、运输最远、建设周期最短等多项纪录

#### 2.1.3 数字工程加速研发（文件247）

- **MathWorks方案**：基于模型的工程设计（MBD），从需求到原型机测试周期可缩短5倍以上
- **案例验证**：上海电气新一代风机控制系统开发、金风科技模型设计之路
- **多保真度建模**：Simscape Electrical提供从SPICE到系统级不同精度模型
- **大规模仿真能力**：物理模型解耦、并行计算、数字孪生

#### 2.1.4 半直驱风电机组可靠性（文件252）

- **东方电气方案**：全集成式半直驱传动链 + 通用化平台设计（通用化程度达85%）
- **标杆机型**：6.x~10MW-222，功率覆盖5.56~10MW，覆盖高湍流/高海拔/沙戈荒
- **验证理念**：不做PPT机型，不让未经验证的机组上天
- **高海拔应用**：东方电气在西藏高海拔风机市场占有率高达90%（3500米~5500米）

#### 2.1.5 海上风电主动防御（文件253）

- **从被动维护到主动防御**：基于多源数据融合的数字化转型
- **海上环境挑战**：零部件约1.5万个，运行工况超3000种，极端风况超IEC设计范围
- **技术方案**：多维数据融合、智能预警系统、实时健康评估

#### 2.1.6 特定场址认证SSDA（文件254）

- **核心逻辑**：场址条件与设计条件差异巨大（湍流、切变、极限风速），仅靠型式认证无法充分保障安全
- **标准化实践**：发布REETC/TN029:2025《风力发电机组特定场址评估技术要求》
- **评估范围**：整体载荷分析、RNA评估、塔架评估、基础评估

#### 2.1.7 海上风电经济收益提升（文件267）

- **明阳方案**：降低度电成本（LCOE）、提升发电量、降低造价三大路径
- **财务指标**：融资前税前财务基准收益率5%，资本金财务基准收益率8%
- **海上优势**：靠近用户、湍流小发电稳定、不占用土地

#### 2.1.8 产业链专项技术

|---------|---------|---------|
| **基础桩焊接** | 铣削坡口+多丝自动焊技术，2023年获首台（套）重大技术装备认定 | 275 |
| **大功率变流器** | 适应中远海发展，国产化关键部件供应链，柔性直流/低频传输配套 | 277 |
| **超长防腐** | Baltoflake涂层35年免维护真实业绩（始于1986年北海油田） | 279 |
| **HVDC海缆监控** | 直流局放在线监测系统，应对空间电荷效应 | 280 |
| **国际出海** | 苏格兰CfD差价合约机制；丹麦风电产业链+能源岛计划；三一重能新兴市场双战略 | 271, 272, 270 |
| **生命周期思维** | IVL瑞典环境研究院主导LCA/EPD认证，覆盖10+行业、200份EPD | 256 |

### 2.2 风资源评估技术

#### 2.2.1 限电率差异研究（文件259）

- 不同轮毂高度/机型方案限电率差异显著，冬季供暖期与风电大发期重叠时限电率明显升高
- 本质因素：电网接纳能力不足导致的"应发未发"
- 评估维度：装机增速（30%+）vs 用电增速（~5%）的长期不匹配

#### 2.2.2 风电波动性新维度（文件260）

- **瑞科科技观点**：从"捕风"到"逐电"，评估维度从平均风速演进到风速分布再到波动性
- **市场化驱动**：全面入市后，不同时刻电价不同，波动性直接影响项目收益
- **新评估方法**：时序出力计算需考虑电价时序分布

#### 2.2.3 特定场址风资源与载荷评估（文件261）

- **发布团体标准REETC/TN029:2025**：与IEC61400-15-1对比，增加湍流概率分布、风切变精细化要求
- **风切变敏感性数据**：行业联合调研，发现负风切变下最小净空急剧减小，疲劳载荷可增至227%
- **地震工况**：建立全行业地震烈度数据库，确定7度0.15g为RNA/钢塔触发基准

#### 2.2.4 南方复杂山地测风策略（文件262）

- **三大痛点**：地形复杂（山脊走向多变、海拔落差大）、气候复杂（季风/台风/局地强对流耦合）、风资源复杂（百米级涡旋）
- **精细化测风方法论**：多塔联合观测+激光雷达+数值模拟
- **测风决策价值**：前期测风投入是最优的风控杠杆

#### 2.2.5 高边坡风电场精准选址（文件263）

- **运达方案**：高边坡机位（山地风电场占比20-25%项目）发电量降低271-457h/年，故障停机小时数是非高边坡的4倍
- **核心问题**：现有标准（NB/T 10103-2018、IEC 61400-1）未考虑建设前后局部微地形改变
- **一体化方案**：精准选址与载荷评估协同

#### 2.2.6 非规则尾流计算方法（文件264）

- **大基地化挑战**：成排成带密集排布，尾流累积效应远超单机/单排情况
- **案例**：Nysted风电场发现传统Park模型低估大型风场内部功率损失；江苏如东21座海上风电场483万千瓦集群
- **CFD方法**：高保真CFD模拟替代工程尾流模型成为趋势

#### 2.2.7 风机大型化与精细化评估（文件265）

- **三一重能观点**：大型化后叶片扫塔/断裂、传动链故障、钢塔褶皱、混塔错台频发
- **根本原因**：实际运行载荷超过部件承载力上限，载荷评估+风资源评估均有误差
- **精细化评估要点**：测风塔代表性、时间空间代表性、代表年风参数提取

#### 2.2.8 高保真建模（文件266）

- **Whiffle方案**：基于LES（大涡模拟）的高保真天气模型
- **应用场景**：复杂地形流动、海上风电场集群尾流、荷兰/比利时海上集群风能资源评估

### 2.3 分散式与乡村风电

#### 2.3.1 最大涡轮机竞赛与趋势（文件304）

- **TNO视角**：大型化迭代持续加速，但2035年后尺寸增长有限（18-24MW）
- **负电价常态化**：2024年荷兰457小时负电价，设计容量系数决定未来盈利能力
- **海上制氢**：中远海风电+管道输氢成为新方向

- **设计创新**：节地型、低噪声、高效率、智能化机组技术需求迫切
- **已批复项目**：全国各省已全面启动试点

#### 2.3.3 预应力构架式塔架（文件306）

- **华斯壮方案**：预应力构架式风电塔，节地技术与生态融合，已获40余项专利
- **核心优势**：不改变地表形态、不破坏耕作层，185米以上成熟技术
- **与同济大学合作**：高耸结构设计领域科研实力雄厚

- **全周期方案**：智能选址→高效评估→设计寻优→精准捕风→产业融合

#### 2.3.7 乡村风电降噪（文件310）

- **中材叶片方案**：大型叶片噪声达~110dB，是乡村风电核心制约因素
- **噪声分类**：气动噪声为主（尾缘噪声+叶尖涡噪声），机械噪声为辅
- **建议措施**：合理选址距离、低噪声翼型设计、叶片后缘锯齿降噪

#### 2.3.8 单点接入乡村风电探索（文件317）

## 第四层次：行业启示与行动建议

### 4.1 技术研发方向

1. **海上风电核心装备自主化**：大功率变流器国产化（IGBT/碳化硅器件）、柔性直流输电成套装备、漂浮式基础结构
2. **超高海拔/极端环境技术储备**：叶片抗失速气动设计、冷启动与热管理、特种防腐/防沙涂层
3. **风资源评估升级换代**：从静态平均风速→动态波动性评估→高保真LES建模→考虑电价的时序评估
4. **AI+风电深度融合**：AI智能体（Agent）赋能运维、声学大模型叶片监测、数字孪生全生命周期管理

### 4.2 标准化与认证

1. **特定场址认证（SSDA）推广**：新建风电场应全面要求SSDA，避免型式认证与场址条件脱节
2. **地震工况精细化**：建立全行业统一的地震评估基准值
3. **生命周期评估（LCA/EPD）**：应对国际贸易碳壁垒，建立风电行业碳足迹数据库
4. **叶片全尺寸疲劳测试规范**：推广双轴/弯扭复合加载技术

### 4.3 商业模式创新

1. **产销一体新范式**：绿电新政下，从运维商向资产经营者转型
2. **"三通"融资模式**：解决分散式风电融资难问题
3. **村企合作共建共享**：乡村风电收益分配新机制
4. **海外市场开拓**：利用苏格兰CfD/丹麦能源岛等国际机制，输出中国风电产业链优势

### 4.4 风险管控

1. **叶片全生命周期质量控制**：设计阶段模型精度→制造阶段工艺稳定性→运输吊装阶段防损伤→运行阶段智能监测
2. **海上风电主动防御**：极端风况预警、智能控制保护、雷达光电要地防御

- **机制电价设计**：建立"多退少补"差价结算机制——市场均价低于机制电价时差额补偿，高于时扣除差额。存量项目机制电价不高于当地煤电基准价。
- **区域分化**：西部新能源大省（甘肃、新疆、青海）电价持续下行——2024年甘肃光伏结算均价仅0.182元/kWh，投资已大幅降温；中东部负荷中心受益于系统运行费用摊薄和晚高峰高价。
- **行业影响**：从"重开发轻运营"转向市场化竞争，企业需提升功率预测精度、交易策略能力和全链条成本管控。

- **路径**：大规模远距离输送模式效率低（每输送1kWh风光电需打捆2kWh火电），提出就地开发与消纳模式。
- **源网荷储一体化实践**：工业园区周边开展新能源源网荷储项目，推动分布式能源和智能微电网建设。

- **快卜新能源（光储充）** ：以CATL储能电池为基础，融合光伏+储能+充电+电池检测。典型配置：20尺箱400kW/1069kWh或800kW/2.138MWh。杭州项目实现全城最低用电成本0.216元/kWh（对比平均0.45元/kWh）。

- **转型路径**：构建分层、分区域源网荷一体、冷热电联供的可再生能源系统，就地消纳、就近协同、远距离调剂。
- **中小型风机**：在分散式风电、工业园区、农村能源革命等场景中具有独特优势。

#### 2.4.5 区域消纳与电力市场实践

- **江苏电力现货试运行**（江苏公司）：以长江为界形成双价区机制。2023年12月试运行期间，江北均价389.48元/MWh，江南均价441.86元/MWh。午间过江通道阻塞频发，建议：培养交易团队、积累数据、提升功率预测、建设辅助决策系统、探索新能源+储能模式。

#### 2.4.6 清华四川院：高比例新能源接入的市场应对

- **国际经验**：英国CfD差价合约机制、美国PPA长期购电协议、欧盟GO/美国REC/RPS制度、德国/英国平衡机制、澳洲调频辅助服务、加州爬坡市场。
- **中国演进**：从"保量保价"→"保障性消纳+市场化交易"→全面市场化。136号文明确了新能源可持续发展价格结算机制的细化规则。
- **关键建议**：完善绿证考核和权责分配、强化电碳耦合、平衡责任下沉至新型经营主体。

## 三、核心问题与挑战

### 3.1 消纳矛盾日益突出

- **通道瓶颈**：陕西夏州供电区928万kW新能源仅靠一座750kV变电站送出；冀北张家口坝上区域送出能力433万kW，装机已达1299万kW，送出比例仅33%。
- **调峰资源不足**：陕西无抽水蓄能机组和储能电站投运，冬季供热与新能源消纳矛盾突出。
- **午间弃光问题**：光伏午间大发时段价格走低，阻塞导致江北地区出现0价，江南出现顶价。

### 3.2 电价全面市场化后的收益不确定性

- **价格下行压力**：甘肃2024年光伏结算均价仅0.182元/kWh，部分项目已触及亏损线。
- **投资决策模型失效**：传统基于固定电价的测算模型不再适用，需引入电力市场预测、区域供需分析等变量。
- **融资风控挑战**：136号文后，金融机构原有风控模型面临挑战，项目现金流预测难度大增。

### 3.3 开发建设制约因素

- **用地问题**：光伏电站占地2.5-3万亩/百万千瓦，远超火电（800亩）；湿地保护法实施后沿海省份海上光伏受影响。
- **生态红线**：全国划定生态保护红线约319万km²，风电光伏项目选址空间收窄。
- **关键零部件短板**：海上风电主轴承、新型叶片材料、动态海缆等仍需技术突破。

### 3.4 人才与安全缺口

- **人才需求**：全球风电行业预计需超53.5万名技术人员，43%需新进人才。
- **安全标准统一化**：GWO标准虽已成国际参考，但国内落地推广仍需加强。
- **低空安全新挑战**：无人机等低空飞行器对风电场运行安全带来新威胁。

---

## 四、趋势研判与对策建议

### 4.1 市场趋势

- **电价全面市场化不可逆**：2025年底前各省出台新能源入市方案，80%发电量将市场化定价。机制电价将成为过渡期收益锚，但长期趋于退出。
- **区域投资重心转移**：从西部资源富集区转向中东部负荷中心。西部光伏投资已大幅降温，华东、华中和华南成为新投资热点。
- **"负荷为王"逻辑确立**：谁拥有用电负荷，谁就能保证收益。负荷侧资源价值凸显，源网荷储一体化成为主流模式。

### 4.2 技术趋势

- **海上风电大型化远海化**：单机容量20MW+、叶轮直径300m+、深水固定式/漂浮式基础成为方向。
- **光储充一体化深度融合**：分布式光储充微电网从单一能源互补转向多场景协同，参与虚拟电厂交易。
- **兆瓦级超快充**：下一代充电技术将降低单车电池配置成本，加速商用车电动化。
- **车网互动（V2G）** ：规模化新能源汽车作为化学储能载体，发挥削峰填谷作用。

### 4.3 对策建议

| 维度 | 具体建议 |
|------|----------|
| **消纳提升** | 配置储能（午间调峰+晚峰保供）、加强与电网调度沟通、推进新能源设备耐高压改造 |
| **市场应对** | 建立专业交易团队、提升功率预测精度、建设辅助决策系统、重视绿证/CCER绿色价值 |
| **投资优化** | 重构投资评估模型（引入现货价格预测）、差异化区域策略、探索新能源+调节性资源打捆投资 |
| **风险管理** | 合同引入电价波动补偿条款、打通ABS/REITs/RWA等市场化退出通道、强化运维安全管理 |
| **技术创新** | 攻关关键零部件（风机轴承、动态海缆等）、推动智慧风电场建设、发展漂浮式海上风电基础 |

### 4.4 关键时间节点

- **2025年**：各省出台新能源全面入市实施方案；冀北电网预计开展现货试运行
- **2028年**：光伏+四小时储能总成本有望降至4元/W左右，与火电平价
- **2029年**：新能源全面参与市场交易（按《全国统一电力市场发展规划蓝皮书》）
- **2030年**：新能源汽车渗透率超70%；非化石能源消费占比达30%以上
- **2035年**：非化石能源消费比重稳步提升，新型电力系统基本建成

function toggleA(el, idx){
  var body = el.parentElement.querySelector('.note-body');
  if(body.classList.contains('show')){
    body.classList.remove('show'); el.classList.remove('open'); return;
  }
  el.classList.add('open');
  if(typeof NOTES_DATA !== 'undefined' && NOTES_DATA[idx]){
    body.innerHTML = mdToHtml(NOTES_DATA[idx]);
    body.classList.add('show');
  } else {
    body.innerHTML = '<div class="error">⚠️ 笔记内容未加载</div>';
    body.classList.add('show');
  }
}


function mdToHtml(text){
  var lines = text.split('\n'), html = '', inCode = false, codeLines = [];
  for(var i=0;i<lines.length;i++){
    var line = lines[i];
    if(line.trim().startsWith('```')){
      if(inCode){ html+='<pre><code>'+esc(codeLines.join('\n'))+'</code></pre>'; codeLines=[]; inCode=false; }
      else inCode=true;
      continue;
    }
    if(inCode){ codeLines.push(line); continue; }
    if(i===0 && line.trim()==='---'){ while(i<lines.length && lines[i].trim()!=='---') i++; continue; }
    if(line.trim()===''){ continue; }
    if(line.trim()==='---'){ html+='<hr>'; continue; }
    if(line.startsWith('#### ')){ html+='<h4>'+inl(line.slice(5))+'</h4>'; continue; }
    if(line.startsWith('### ')){ html+='<h3>'+inl(line.slice(4))+'</h3>'; continue; }
    if(line.startsWith('## ')){ html+='<h2>'+inl(line.slice(3))+'</h2>'; continue; }
    if(line.startsWith('# ')){ continue; }
    if(line.trim().startsWith('- ')||line.trim().startsWith('* ')){ html+='<li>'+inl(line.trim().slice(2))+'</li>'; continue; }
    if(/^\d+[\.\)]/.test(line.trim())){ html+='<li>'+inl(line.trim().replace(/^\d+[\.\)]\s*/,''))+'</li>'; continue; }
    if(line.trim()) html+='<p>'+inl(line)+'</p>';
  }
  html = html.replace(/(<li>.*?<\/li>\s*)+/g, function(m){ return '<ul>'+m+'</ul>'; });
  return html;
}
function inl(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/\[\[(.+?)\]\]/g,'<code>[[$1]]</code>').replace(/`(.+)`/g,'<code>$1</code>'); }
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

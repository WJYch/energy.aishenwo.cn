<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风电与新能源 — 电小团</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Noto+Sans+SC:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter','Noto Sans SC',sans-serif;background:var(--bg-cream);color:#1F2937;line-height:1.6;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
        .card{background:#fff;border-radius:20px;padding:40px 36px;box-shadow:0 4px 24px rgba(0,0,0,.06);text-align:center;max-width:480px;border:1px solid rgba(0,0,0,.04);}
        .card .icon{font-size:48px;margin-bottom:12px;}
        .card h2{font-size:22px;font-weight:700;margin-bottom:8px;}
        .card p{font-size:15px;color:#6B7280;margin-bottom:6px;}
        .card .note{font-size:13px;color:#9CA3AF;margin-top:16px;}
        .card .btn{display:inline-block;background:var(--teal);color:#fff;padding:10px 28px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;margin-top:18px;transition:background .2s;}
        .card .btn:hover{background:#0D9488;}
    </style>
  <link rel="stylesheet" href="/assets/css/dxt-theme.css">
</head>
<body>
    <div class="card">
        <div class="icon">🌬️</div>
        <h2>风电与新能源</h2>
        <p>课程内容整理中...</p>
        <p class="note">该主题课程内容正在建设中，敬请期待。</p>
        <a href="/training/" class="btn">← 返回课程列表</a>
    </div>
</body>
</html>

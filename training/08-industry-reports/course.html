<script>
var NOTES = [
  {tag:"A组", color:"var(--purple)", title:"能源电力行业报告汇总（A组）", desc:"宏观趋势 · 供需格局 · 投资与造价 · 可再生能源 · 电力市场与碳市场", src:"~30份宏观行业报告/白皮书/年度发展报告"},
  {tag:"B组", color:"var(--teal)", title:"电力数据与统计分析（B组）", desc:"电力供需核心数据 · 市场化交易 · 储能运营统计 · 设备造价 · 能源大数据全景", src:"~35份电力数据/统计分析/行业运行数据手册"},
];

(function(){
  var html = '';
  for(var i=0;i<NOTES.length;i++){
    var n = NOTES[i];
    html += '<div class="note-card">';
    html += '<div class="note-head" onclick="toggleA(this,'+i+')"><span class="arrow">\u25b6</span>';
    html += '<div class="note-info"><span class="tag" style="background:'+n.color+'">'+n.tag+'</span>';
    html += '<div class="note-title">'+n.title+'</div><div class="note-desc">'+n.desc+'</div><div class="note-src">'+n.src+'</div></div></div>';
    html += '<div class="note-body" id="bodyA-'+i+'"></div></div>';
  }
  document.getElementById('note-containerA').innerHTML = html;
})();

function toggleA(el, idx){
  var body = el.parentElement.querySelector('.note-body');
  if(body.classList.contains('show')){
    body.classList.remove('show'); el.classList.remove('open'); return;
  }
  el.classList.add('open');
  if(typeof NOTES_DATA !== 'undefined' && NOTES_DATA[idx]){
    body.innerHTML = mdToHtml(NOTES_DATA[idx]);
    body.classList.add('show');
  }
}

function mdToHtml(text){
  var lines = text.split('\n'), html = '', inCode = false, codeLines = [];
  for(var i=0;i<lines.length;i++){
    var line = lines[i];
    if(line.trim().startsWith('```')){
      if(inCode){ html+='<pre><code>'+esc(codeLines.join('\n'))+'</code></pre>'; codeLines=[]; inCode=false; }
      else inCode=true;
      continue;
    }
    if(inCode){ codeLines.push(line); continue; }
    if(line.trim()===''){ continue; }
    if(line.trim()==='---'){ html+='<hr>'; continue; }
    if(line.startsWith('#### ')){ html+='<h4>'+inl(line.slice(5))+'</h4>'; continue; }
    if(line.startsWith('### ')){ html+='<h3>'+inl(line.slice(4))+'</h3>'; continue; }
    if(line.startsWith('## ')){ html+='<h2>'+inl(line.slice(3))+'</h2>'; continue; }
    if(line.startsWith('# ')){ continue; }
    if(line.trim().startsWith('- ')){ html+='<li>'+inl(line.trim().slice(2))+'</li>'; continue; }
    if(line.trim()) html+='<p>'+inl(line)+'</p>';
  }
  html = html.replace(/(<li>.*?<\/li>\s*)+/g, function(m){ return '<ul>'+m+'</ul>'; });
  return html;
}
function inl(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/\[\[(.+?)\]\]/g,'<code>[[$1]]</code>').replace(/\`(.+)\`/g,'<code>$1</code>'); }
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>

var NOTES_DATA = [];
NOTES_DATA[0] = `# 能源电力行业报告汇总（A组）

> **来源文件**：约30份宏观电力行业报告、白皮书及年度发展报告
> **提炼时间**：2026年6月
> **核心方法**：四层次分析——宏观趋势 → 供需格局 → 投资与市场 → 关键数据

---

## 一、宏观趋势：全球与中国的能源转型图景

### 1.1 全球能源格局（毕马威/IEA/RMI）

| 维度 | 关键数据 | 出处 |
|------|---------|------|
| 全球一次能源消费增速 | 2024年增长约2%，能源效率提升陷入停滞 | 1002_毕马威（基于《世界能源统计年鉴2025》） |
| 可再生能源占比 | 2024年风、光、生物燃料等满足全球能源需求的~8% | 同上 |
| 电力需求增速 | 电力需求增速为整体能源需求的两倍，电气化是大势所趋 | 同上 |
| 全球可再生能源装机 | 约44.5亿kW，同比增长15.0%，新增5.9亿kW占电力新增94% | 1012_中国可再生能源发展报告2024 |
| 全球清洁能源投资 | 首次突破2万亿美元（+11%），其中可再生能源~7280亿美元（+8%） | 同上 |
| IEA全球预测 | COP28"2030年可再生能源装机翻三倍"目标在追踪中 | 1030_IEA Renewables 2024 |

**毕马威8大要点**：
1. 全球能源供不应求，增长超过可再生能源供应能力
2. 2024年可再生能源满足新增电力需求80%+
3. 电气化是大势所趋，电力需求增速为能源总需求两倍
4. 天然气消费创历史新高，不仅是过渡燃料
5. 石油需求增长率下降，美欧已达峰值
6. 煤炭占比下降但需求仍在上升
7. 能源贸易流向因地缘政治重塑新格局
8. 大宗商品价格波动性降低但不确定性仍存

### 1.2 中国能源经济全景（2025年展望）

- **2024年GDP**：134.9万亿元，同比增长5.0%
- **全社会用电量**：9.85万亿kWh，同比+6.8%
- **2025年预测用电量**：10.4万亿kWh（+6%），最高负荷15.5亿kW
- **能源自给率**：保持在80%以上
- **非化石能源占能源消费比重**：稳步提升

> 来源：1015_供需形势报告、893_中国能源大数据报告2025、888_中国能源数据报告2025

### 1.3 新型电力系统建设

**RMI报告核心观点**（1018）：
- "充裕的灵活性是新型电力系统的核心特征"
- 以青海省和广东省为案例，评估2023-2030年系统灵活性
- 明确源侧、储侧、荷侧、网侧四类灵活性技术
- 建议加速发展低零碳灵活性资源

**电力规划设计总院**（1004_2025报告）：
- 新型电力系统建设典型场景：国家和地方政策密集出台
- 核心技术与重大装备应用创新加速
- 配套政策与体制机制创新持续推进

## 四、可再生能源发展专题

### 4.1 中国可再生能源发展报告2024（1012）

| 指标 | 数据 |
|------|------|
| 可再生能源总装机 | 18.9亿kW，占全部发电装机的56.4% |
| 新增装机 | 3.74亿kW（+22%），占全国新增86.3% |

**资源禀赋**：
- 水力技术可开发量6.87亿kW，全球首位
- 抽水蓄能资源站点总规模约16亿kW
- 陆上100m高度风能资源技术可开发量约34亿kW
- 全国年水平面总辐照量1200~2000kWh/m²

### 4.2 抽水蓄能产业发展报告2024（1009）

- **全球装机**：约1.85亿kW，中国连续9年居世界首位
- **国内投产**：2024年新增775万kW，累计5869万kW
- **核准在建**：约2亿kW

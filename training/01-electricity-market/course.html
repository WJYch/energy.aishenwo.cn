function mdToHtml(text){
  var lines = text.split('\n'), html = '', inCode = false, codeLines = [];
  for(var i=0;i<lines.length;i++){
    var line = lines[i];
    if(line.trim().startsWith('```')){
      if(inCode){ html+='<pre><code>'+esc(codeLines.join('\n'))+'</code></pre>'; codeLines=[]; inCode=false; }
      else inCode=true;
      continue;
    }
    if(inCode){ codeLines.push(line); continue; }
    if(line.trim()===''){ continue; }
    if(line.trim()==='---'){ html+='<hr>'; continue; }
    if(line.startsWith('#### ')){ html+='<h4>'+inl(line.slice(5))+'</h4>'; continue; }
    if(line.startsWith('### ')){ html+='<h3>'+inl(line.slice(4))+'</h3>'; continue; }
    if(line.startsWith('## ')){ html+='<h2>'+inl(line.slice(3))+'</h2>'; continue; }
    if(line.startsWith('# ')){ continue; }
    if(line.trim().startsWith('- ')){ html+='<li>'+inl(line.trim().slice(2))+'</li>'; continue; }
    if(line.trim()) html+='<p>'+inl(line)+'</p>';
  }
  html = html.replace(/(<li>.*?<\/li>\s*)+/g, function(m){ return '<ul>'+m+'</ul>'; });
  return html;
}
function inl(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/\[\[(.+?)\]\]/g,'<code>[[$1]]</code>').replace(/\`(.+)\`/g,'<code>$1</code>'); }
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

> 涵盖：电力市场绪论（985）、经济学基础（986）、市场结构与交易品种（987）、中长期合约（988）、电力监管（989~990）、二级市场（991）、期货市场（992）、辅助服务市场（993）、电力市场理论与实务（996）、行业基础培训（997）

## 内容结构

## 一、电力市场基础（第1-2讲）

### 1.1 电力市场的定义与内涵

电力市场的本质是**还原电能商品的商品属性**。中国新一轮电力体制改革围绕"体"与"制"两个层面展开：

- **"体"的改革**：[[网厂分离]]、[[配售分离]]、运营主体与投资主体相分离、输配电投资多元化
- **"制"的改革**：构建电力市场竞争平台，实现发电与用电直接交易，通过竞争发现价格

电力市场的**五大内涵**：
1. **市场结构**：对垄断的电力工业实行网厂分离、配售分离重组
2. **产权革命**：推进混合所有制，引入民营资本
3. **市场竞争**：供需双方报价，形成反映供求关系的价格
4. **[[市场准入]]**：实行政府核准制度
5. **[[市场监管]]**：发电环节适度监管，输配环节加强监管，售电环节放松监管

### 1.2 经济学基础

**市场的本质**：买者和卖者聚集交易并决定商品价格和产量的机制，解决"为谁生产、生产什么、如何生产"三大问题。

**[[社会福利最大化]]**：市场通过竞争实现资源最优配置。计划经济中政府定价难以准确反映供求关系，定价过低则生产者无积极性，定价过高则减少消费者剩余。

**市场失灵的四类情形**：
1. **[[垄断]]/串谋**：生产者可自行决定交易价格和数量，扰乱资源配置
2. **[[外部性]]**：生产活动的社会成本（如污染）未被计入，导致市场失衡
3. **信息不对称**：激励相容原理——通过机制设计让参与者个体利益最大化策略与整体利益一致（如"切苹果的人后选"）
4. **税收扭曲**：税收减少生产者剩余和消费者剩余

**政府角色**：经济学十大原理之六——政府有时可以改善市场结果。政府有形的手应使市场无形的手更加有力，而非替代。

**电力市场机制设计的八个检验标准**：
1. 能否促进能源结构清洁化转型
2. 能否提高能源生产与消费效率
3. 能否**最大化社会福利**（不是简单降电价）
4. 能否给予市场充分的选择权（交易品种、交易范围）
5. 能否形成合理的交易成本（过网费）
6. 能否实现更大范围的资源优化配置（打破市场壁垒）
7. 能否提高发输配电资产的利用效率
8. 能否正确引导电力规划

---

## 二、市场结构与交易品种（第3讲）

### 2.1 市场结构的四种形态

电力市场结构经历了从垄断到竞争的演进过程：

| 市场结构 | 特征 | 示意图 |
|---------|------|-------|
| **[[纵向一体]]**（垂直垄断） | 一家公司包揽发、输、配、售电，无竞争 | 发电→输电→配电→售电→用户（同一公司） |
| **[[单一买方]]** | 发电竞争引入，单一购电机构向发电商购电 | 多个发电商→单一买方→配电公司→用户 |
| **[[趸售竞争]]**（批发竞争） | 多买多卖，大用户和配电公司有选择权 | 发电商↔趸售市场↔配电公司/大用户→小用户 |
| **[[零售竞争]]** | 所有用户可选择供电商，售电商代理小用户 | 发电商↔趸售市场↔零售商↔零售市场↔用户 |

**市场对称性**：供方与需方的结构对称性影响社会福利分配。对称结构有利于实现生产者与消费者剩余对称的均衡。

### 2.2 物理市场交易体系（时间维度）

\`\`\`
年度 ─→ 月度 ─→ 日前 ─→ 日内 ─→ 实时
│          │        │        │        │
中长期     二级    日前    实时    辅助服务
直购电     市场    市场    市场    市场
\`\`\`

### 2.3 交易方式分类

1. **[[双边交易]]**：买卖双方协商确定交易曲线和价格，经调度交易中心安全校核后签约
2. **[[集中撮合交易]]**（高低匹配）：买方报价从高到低排、卖方报价从低到高排，按优先级撮合
3. **[[挂牌交易]]**：价格锁定，按申报量比重或时间顺序成交
4. **二级市场**：针对已成交合约的再次交易（发电权/用电权转让）

---

## 三、中长期合约市场（第4讲）

### 3.1 合约市场的作用

合约是平等主体之间设立、变更、终止民事权利义务关系的协议，作用是将"不确定"变为"确定"。

**四大作用**：
1. **平稳现货市场价格**：电力不能大规模储存，现货价格呈随机尖峰跳跃特性
2. **实现电力"虚拟存储"**：通过合约锁定未来电量，相当于储存
3. **防止市场力操纵**：市场力即生产者改变市场价格偏离竞争水平的能力
4. **提供中长期经济信号**：指导检修计划、燃料购置和资源配置

### 3.2 交易模式的博弈过程

**双边交易流程**：双方协商细节 → 调度中心安全校核 → 通过则签约，未通过则裁减

**安全校核机制**：
- 潮流无阻塞时：所有双边交易直接成交
- 潮流阻塞时：按"上浮费率"高低排序，优先通过社会福利大的交易

**集中撮合交易流程**：
1. 报价决策 → 2. 组织报价 → 3. 报价排序 → 4. 高低匹配 → 5. 均价定价

**挂牌交易两种方式**：按申报量比重成交 vs 按时间优先顺序成交

### 3.3 中长期交易的优越性

1. 电力需求具备较强弹性，有利于形成合理价格
2. 投资增加电力供给弹性
3. **弱化市场力**
4. 有足够时间提升资源优化配置的深度和广度
5. 保障电力价格平稳性
6. 稳定供需双方的未来预期
7. 采用浮动价格机制规避燃料价格波动风险
8. 电价与大用户产品价格联动，实现风险共担

---

## 四、日前市场（第6讲，回顾第4讲）

### 4.1 设置日前市场的目的

1. 由交易中心每天组织，应对**短期负荷不平衡**
2. 反映短期供需平衡关系与生产成本，为长期合约市场提供**价格风向标**

### 4.2 中长期合约在现货市场的交割

- **物理交割**：预测短期负荷曲线减去合约发电计划 = 日前竞价空间
- **价差交割**：日前市场全电量竞争，合约按合约价结算，偏差部分按日前市场价格结算

### 4.3 发电厂报价方式

- **单段报价**：一个价格覆盖全部出力
- **多段报价（上升型）**：随出力增加价格升高，反映资源稀缺性。第一段低价保基本中标，后续段高价谋收益

### 4.4 日前市场出清

- **无约束交易计划**：形成[[系统边际电价]]（SMP）
- **有约束交易计划**：考虑电网阻塞，形成[[分区电价]]

### 4.5 [[节点电价]]

由MIT教授Schweppe于1982年提出。定义：在满足输电网络设备约束条件下，基于各类发电资源报价，在电价节点增加单位负荷需求时的**边际成本**。

**节点电价的三层意义**：
1. 以分时电价引导电网负荷**时间分布**，促进新能源消纳
2. 以节点电价引导电网负荷**空间分布**，激励分布式电源或负荷转移
3. 用新的市场模式代替传统调度模式

### 4.6 Lagrange松弛法求解

日前市场出清模型可转化为Lagrange函数，通过主迭代（调整λ消除不可行）与子迭代（各机组发电成本最小化）交替寻优，与经济学家描述的"看不见的手"的均衡过程一致。

### 4.7 日前市场的7大意义

1. 引导负荷时间分布
2. 引导负荷空间分布
3. 替代传统调度模式
4. 中长期解决电量均衡，现货解决**电力供需**均衡
5. 促进能源结构转型
6. 推进需求侧响应
7. 激活售电市场活力

## 五、二级市场与发电权交易（第7讲）

### 5.1 什么是二级市场

- **发电权**：电厂通过合约市场、日前市场获得的发电初始合同
- **用电权**：用户通过合约市场、日前市场获得的用电初始合同
- **二级市场**：按照一定规则组织发电厂和用户开展发电权与用电权交易的市场

### 5.2 为什么开展二级市场交易

1. 降低发电企业的**违约风险**（设备故障时可通过发电权交易规避违约）
2. 利用市场机制实现水电和火电的**互相补偿**
3. 实现基于发电权交易的**自调度**，增强市场自由度、降低监管成本
4. 增加市场约束的弹性化

### 5.3 发电权交易模式

- **经纪人模式**：由市场运营机构开展集中撮合交易
- **双边协商模式**：运营机构提供平台，双方协商后报调度安全校核

### 5.4 交易约束

1. 辅助服务市场中标的机组（AGC、备用）一般不参与发电权交易
2. 购入发电权+已中标出力 ≤ 最大装机容量
3. 出售发电权 ≤ 已中标总出力

### 5.5 标准合约（块合同）

英国电力交易所的块合约示例：半小时、1小时、2小时、4小时等标准格式，明确交割时间，时长从**8小时到168小时**不等。

**块合同出清方法**（北欧电力交易所）：
- 第一阶段：不考虑时段耦合，当作独立每小时合约叠加入供需曲线
- 第二阶段：计算相关时段出清价格平均值，与块合同报价比较决定是否接受

### 5.6 用电权交易

消费者消除未来用电不确定性的市场，用户可根据分时电价优化自身负荷曲线。

### 5.7 二级市场的作用

1. 用电权和发电权统一平台交易
2. 激励约束弹性化，扩大资源配置空间
3. 全面降低一级市场交易风险
4. 发电权与用电权可对冲，实现金融意义的电力平衡

## 六、期货市场（第992讲）

### 6.1 期货的起源与发展

从19世纪芝加哥粮食交易开始：远期合约 → 投机者参与 → 期货交易所（1848年CBOT）→ 标准化合约（1865年）→ 保证金制度（1865年）→ 对冲机制（1882年）→ 结算公司（1925年）

### 6.2 期货合约要素

交易品种、交易单位（1手）、最小变动价位、每日价格波动限制（涨跌停板）、合约月份、最后交易日、交割等级、保证金（合约价值的**5%~10%**）

**远期合约 vs 期货合约**：
- 远期：私下签约、非标准化、到期结算
- 期货：交易所内交易、标准化合约、每日盯市结算、可对冲平仓

### 6.3 期货交易三大制度

1. **保证金制度**：结算准备金（未被占用资金）+ 交易保证金（已占用，合约价值5%~10%），体现了"以小博大"的杠杆效应
2. **平仓制度**：合约对冲（反向操作）或实物交割（交割率仅**2%左右**）
3. **结算制度**：逐日盯市（每日结算无负债）

### 6.4 期货价格与现货价格的关系

随着交割时间逼近，期货价格**收敛于现货价格**。期货价格 = 现货价格 + 持有成本（存储、利息等）。

### 6.5 三类交易者

1. **[[套期保值]]者**：在现货和期货市场对同一种商品同时做方向相反、数量相等的买卖，实现风险对冲
   - 多头套保：锁定采购成本
   - 空头套保：锁定销售价格
2. **投机者**：只想赚取价差，承担风险
3. **套利者**：利用期货-现货间、合约间的价差关系获利（期现套利、跨市套利、跨期套利、跨商品套利）

### 6.6 电力期货的特殊性

电力商品的独特属性（不适合储存、生产与消费同步）决定其特殊性：
1. **交割持续一个时间段**（整月），而非瞬时
2. **基差较大**：期货到期前几个交易日停止交易，期间风险无法回避
3. **交割困难**：需调度者统一制定交割计划，受系统安全约束

**电力期货合约设计要点**：
- 涨跌停板：上一交易日结算价的**±5%**
- 保证金：**10%**（可抵御两个停板风险）
- 交割月份：1~12月连续设置
- 交割方式：交割月内大多数天数每天按一定量平均交付

**建立电力期货市场的必要条件**：
1. 电力价格的自由波动性
2. 平等的交易双方，市场主体的独立自主性
3. 电力系统的稳定安全运行

**国外电力期货市场**：NYMEX（美国，1996年）、CBOT（美国，1996年）、Nord Pool（北欧，1996年）、APX（荷兰，1999年）

## 七、电力监管（第5讲）

### 7.1 监管的必要性及原则

**必要性**：维护市场秩序、保障系统安全、保护合法权益、促进电力事业发展

**五大原则**：
1. 代表社会公正利益，平衡企业与公众利益
2. 不越位，不干涉企业生产管理
3. 自律与监管相结合
4. 遵循电力工业特点，确保系统安全
5. 监管工作本身高效透明

### 7.2 三种监管方式

1. **预警与预防**：对未来可靠性、充裕度、市场设计适应性的预评估
2. **[[实时监控]]**：重点监管发电厂是否滥用市场力、电网公司是否无歧视开放
3. **事后评估分析**：微观层面评估市场力使用，宏观层面评估市场效率

### 7.3 市场力监管

**市场力（Market Power）**：市场成员在较长时间内控制市场价格的能力。

**发电公司非竞争手段**：经济缩减（故意报高价格）、物理缩减（谎报检修不申报容量）、阻碍新成员进入、形成价格联盟

**监管指标**：
1. **[[HHI指数]]**（市场份额平方和）：低于1800竞争激烈，1800~2500垄断竞争，高于2500严重垄断。中国2002年重组后HHI约1900
2. **Top-m指标**：最大m个集团份额之和，m=4时大于65表明寡头垄断
3. **BS指标**（申报容量充足率）：衡量市场整体供给充裕程度
4. **RSI指标**（供给剩余系数）：评估单个发电商的市场控制力，低于100%时有操纵能力

### 7.4 售电监管（非对称性监管）

以美国德州为例：对电网公司直接零售价格实行管制，对其他售电商放开竞争，德州成为全美最成功的售电市场。

### 7.5 市场效率评估

市场效率三层次：**静态效益**（现有资源优化使用）、**动态效益**（正确经济信号引导资源流通）、**社会效益**（合理价格最大化社会福利）

### 7.6 信息披露制度

理论基础：[[信息经济学]]——信息不对称导致逆向选择和道德风险。

信息披露四重意义：
1. 促进资源优化配置
2. 有效消除逆向选择（劣质品驱逐优质品）
3. 有效防范道德风险（内幕交易、寻租行为）
4. 交易机构市场公信力的内在要求

### 7.7 市场评估指标体系

涵盖十大维度：市场供需、交易状况、市场结构、市场行为、市场效率、市场有序性、开放程度、外部性、公平性、风险

**Lerner指数**：$L = (P - MC) / P$，度量价格与边际成本的偏离程度

## 八、辅助服务市场（第8讲）

### 8.1 什么是电力辅助服务

为维护电力系统安全稳定运行、保证电能质量，由发电企业和电力用户提供的除正常生产电能以外的服务，包括：**调频、备用、无功调节、黑启动**。

### 8.2 频率控制

中国电网额定频率**50Hz**（美国60Hz）。发电大于负荷时频率升高，反之降低。

**AGC**（自动发电控制）：发电机组或储能接受调度指令，跟踪负荷变化、维持频率在允许偏差范围内。

### 8.3 调频辅助服务市场

**发电机调频成本**两部分：
1. **机会成本**（容量成本）：同一容量只能提供能量、调频和备用中的一种
2. **里程费用**：调频里程 = 机组参与正/负调节"走过的路程"绝对值之和

**调频性能三指标**：相关度（Correlation）、延迟度（Delay）、精度（Precision），加权平均后修正报价

**激励相容的结算机制**：未中标的发电企业按边际价格支付，中标企业费用由未中标者按容量大小分摊

**PJM调频市场实例**：
- 市场类型：集中竞价，结算周期每小时
- 调频需求：负荷的**0.7%**
- RegA（传统/慢速）：火电机组，响应时间5min内
- RegD（动态/快速）：储能、飞轮等，响应时间几秒，**1 RegD = 3 RegA**
- 结算：容量收益 + 里程收益

### 8.4 旋转备用市场

**按响应速度分类**：
- 旋转备用：同步运行，**10分钟内**可增出力
- 非旋转备用：**30分钟内**可开机并带负荷
- 替代备用：**30~60分钟内**响应，用于N-2安全约束

**按调整方向分类**：
- 正备用：预留在线容量应对实时平衡
- 负备用：预留出力下调空间，应对新能源出力突增

**备用市场竞价原理**：按容量价格由低到高排序，边际定价。系统正备用应达到负荷的**3~5%**。

### 8.5 调频、备用与能量市场的协同

\`\`\`
日前机组组合(SCUC)
    ↓
调频市场出清 → 备用市场出清 → 日前市场(SCED)
    ↓
实时市场
\`\`\`

协同逻辑：同一容量在同一时段只能提供一种服务。调频中标调整出力上下限，备用中标亦调整，未中标机组参与能量市场。

### 8.6 无功辅助服务

- **基本服务**：迟相功率因数0.9~1注入无功，进相0.97~1吸收无功
- **有偿服务**：超出上述范围的无功服务
- 补偿模式：评估全网无功补偿费用 → 按容量分摊 → 按贡献率分配

### 8.7 黑启动

电网全黑后，通过具有自启动能力的机组（如柴油发电机）启动，逐步恢复系统。

PJM补偿方式：{固定成本+变动成本+培训成本+燃料储运成本} × (1+激励系数)，以燃气轮机和水电机组为主。
